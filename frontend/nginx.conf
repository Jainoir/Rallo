server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Same-origin API calls are proxied to the gateway (production apiUrl is '').
    # API_UPSTREAM is substituted by the nginx image's envsubst entrypoint, so the
    # same image serves docker-compose (http://api-gateway:8080) and the cloud
    # (an https://... gateway URL). Host must stay the upstream's own hostname
    # (nginx default $proxy_host) — cloud routers dispatch by Host header.
    location /api/ {
        proxy_pass ${API_UPSTREAM};
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — let the Angular router handle unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
