# API gateway — the only public backend entry point
# Deploy from repo root: flyctl deploy --config fly.api-gateway.toml
app = "rallo-jainoir-gateway"
primary_region = "yul"

[build]
  dockerfile = "api-gateway/Dockerfile"

[env]
  JAVA_TOOL_OPTIONS = "-XX:MaxRAMPercentage=75"
  AUTH_SERVICE_URL = "http://rallo-jainoir-auth.internal:8081"
  CHECKIN_SERVICE_URL = "http://rallo-jainoir-checkin.internal:8082"
  NOTIFICATION_SERVICE_URL = "http://rallo-jainoir-notify.internal:8083"
# Secrets (set with `flyctl secrets set -a rallo-jainoir-gateway`): JWT_SECRET

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
