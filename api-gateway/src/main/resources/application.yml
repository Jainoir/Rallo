server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            # comma-separated; add the deployed frontend origin via env
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/friends/**,/api/groups/**

        - id: checkin-service
          uri: ${CHECKIN_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/goals/**,/api/checkins/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/notifications/**

jwt:
  secret: ${JWT_SECRET:change-me-in-production-at-least-32-chars!!}

# When set, every forwarded request is stamped with X-Gateway-Secret so
# downstream services can reject direct traffic. Leave empty in local dev.
gateway:
  shared-secret: ${GATEWAY_SHARED_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
