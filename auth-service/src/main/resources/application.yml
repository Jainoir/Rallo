server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:auth_user}
    password: ${SPRING_DATASOURCE_PASSWORD:auth_pass}

  jpa:
    hibernate:
      ddl-auto: validate      # Flyway owns the schema (src/main/resources/db/migration)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    # Existing databases created by Hibernate are baselined at V1; fresh
    # databases run the full migration chain from V1.
    baseline-on-migrate: true

# When set, only requests stamped by the gateway (X-Gateway-Secret) are accepted.
gateway:
  shared-secret: ${GATEWAY_SHARED_SECRET:}

jwt:
  secret: ${JWT_SECRET:change-me-in-production-at-least-32-chars!!}
  access-token-expiry-ms: 900000      # 15 minutes
  refresh-token-expiry-ms: 604800000  # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
