server:
  port: 8082

spring:
  application:
    name: checkin-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/checkin_db}
    username: ${SPRING_DATASOURCE_USERNAME:checkin_user}
    password: ${SPRING_DATASOURCE_PASSWORD:checkin_pass}

  jpa:
    hibernate:
      ddl-auto: validate      # Flyway owns the schema (src/main/resources/db/migration)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    # Existing databases created by Hibernate are baselined at V1; fresh
    # databases run the full migration chain from V1.
    baseline-on-migrate: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:rallo}
    password: ${SPRING_RABBITMQ_PASSWORD:rallo_pass}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

# When set, only requests stamped by the gateway (X-Gateway-Secret) are accepted.
gateway:
  shared-secret: ${GATEWAY_SHARED_SECRET:}

jwt:
  secret: ${JWT_SECRET:change-me-in-production-at-least-32-chars!!}

rallo:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
  rabbitmq:
    exchange: rallo.exchange
    routing-keys:
      checkin-recorded: checkin.recorded
      streak-broken: streak.broken

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
