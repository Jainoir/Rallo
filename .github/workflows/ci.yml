name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build and run tests
        run: ./mvnw verify -B

  frontend-build-and-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (headless Chrome)
        run: npm run test:ci

  dependency-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: OWASP Dependency-Check
        run: mvn org.owasp:dependency-check-maven:check -B
        continue-on-error: true   # warn on first run; harden once baseline is set

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: '**/dependency-check-report.html'

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container Scan (Trivy) — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        service: [api-gateway, auth-service, checkin-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build fat jar
        run: mvn package -pl ${{ matrix.service }} -am -DskipTests -B

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ matrix.service }}/Dockerfile \
            -t rallo/${{ matrix.service }}:${{ github.sha }} .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rallo/${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'   # warn only; set to '1' to fail on findings

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [build-and-test, frontend-build-and-test, container-scan]
    if: github.ref == 'refs/heads/main'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy all services
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN secret not configured — skipping deploy. See DEPLOY.md."
            exit 0
          fi
          set -e
          flyctl deploy --remote-only --config fly.auth-service.toml
          flyctl deploy --remote-only --config fly.checkin-service.toml
          flyctl deploy --remote-only --config fly.notification-service.toml
          flyctl deploy --remote-only --config fly.api-gateway.toml
          flyctl deploy frontend --remote-only
