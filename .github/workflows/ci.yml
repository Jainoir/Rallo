name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build and run tests
        run: ./mvnw verify -B

  frontend-build-and-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # On failure, surface the npm error as an annotation (job logs are
        # auth-only via API; annotations are publicly readable).
        run: |
          npm ci 2> npm-err.txt || {
            echo "::error title=npm ci failed::$(tail -c 1200 npm-err.txt | tr '\n' ' ')"
            exit 1
          }

      - name: Build
        run: npm run build

      - name: Test (headless Chrome)
        run: npm run test:ci

  dependency-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: OWASP Dependency-Check
        run: mvn org.owasp:dependency-check-maven:check -B
        continue-on-error: true   # warn on first run; harden once baseline is set

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: '**/dependency-check-report.html'

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container Scan (Trivy) — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false   # one failing leg must not cancel the other scans
      matrix:
        service: [api-gateway, auth-service, checkin-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build fat jar
        run: mvn package -pl ${{ matrix.service }} -am -DskipTests -B

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ matrix.service }}/Dockerfile \
            -t rallo/${{ matrix.service }}:${{ github.sha }} .

      - name: Trivy image scan
        # Trivy CLI via the official install script — no marketplace action to
        # resolve, so job setup can't fail on a bad/renamed action ref.
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/trivy-bin"
          "$RUNNER_TEMP/trivy-bin/trivy" image \
            --format sarif \
            --output trivy-${{ matrix.service }}.sarif \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            rallo/${{ matrix.service }}:${{ github.sha }}

      - name: Upload Trivy results to GitHub Security
        # Requires code scanning (public repo or Advanced Security);
        # non-blocking so the scan itself still gates while the repo is private.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  e2e:
    name: E2E (Playwright vs compose stack)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'   # full-stack job; skip on PRs to save minutes
    needs: [build-and-test, frontend-build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Start the full stack
        run: docker compose up --build -d

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies + browser
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Wait for the gateway to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null; then
              echo "gateway is up"; exit 0
            fi
            sleep 5
          done
          echo "gateway never became healthy"; docker compose logs; exit 1

      - name: Run E2E journey
        working-directory: frontend
        run: npx playwright test

      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail 100

      - name: Tear down
        if: always()
        run: docker compose down -v

  # Deployment: Render auto-deploys every push to main via render.yaml
  # (Blueprint connected in the Render dashboard — see DEPLOY.md).
  # No CI deploy job is needed; this pipeline gates quality and security.
