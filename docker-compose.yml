services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  checkin-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checkin_db
      POSTGRES_USER: checkin_user
      POSTGRES_PASSWORD: checkin_pass
    ports:
      - "5434:5432"
    volumes:
      - checkin-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkin_user -d checkin_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_pass
    ports:
      - "5435:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI: http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: rallo
      RABBITMQ_DEFAULT_PASS: rallo_pass
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application services ─────────────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars!!}
    depends_on:
      auth-db:
        condition: service_healthy

  checkin-service:
    build:
      context: .
      dockerfile: checkin-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://checkin-db:5432/checkin_db
      SPRING_DATASOURCE_USERNAME: checkin_user
      SPRING_DATASOURCE_PASSWORD: checkin_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: rallo
      SPRING_RABBITMQ_PASSWORD: rallo_pass
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars!!}
    depends_on:
      checkin-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/notification_db
      SPRING_DATASOURCE_USERNAME: notification_user
      SPRING_DATASOURCE_PASSWORD: notification_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: rallo
      SPRING_RABBITMQ_PASSWORD: rallo_pass
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars!!}
      AUTH_SERVICE_URL: http://auth-service:8081
      CHECKIN_SERVICE_URL: http://checkin-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      checkin-service:
        condition: service_started
      notification-service:
        condition: service_started

volumes:
  auth-db-data:
  checkin-db-data:
  notification-db-data:
