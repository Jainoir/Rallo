# Notification service — private, reached via rallo-jainoir-notify.internal:8083
# Deploy from repo root: flyctl deploy --config fly.notification-service.toml
app = "rallo-jainoir-notify"
primary_region = "yul"

[build]
  dockerfile = "notification-service/Dockerfile"

[env]
  JAVA_TOOL_OPTIONS = "-XX:MaxRAMPercentage=75"
# Secrets (set with `flyctl secrets set -a rallo-jainoir-notify`):
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD,
#   SPRING_RABBITMQ_ADDRESSES (amqps URL from CloudAMQP)

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
