server:
  port: 8083

spring:
  application:
    name: notification-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/notification_db}
    username: ${SPRING_DATASOURCE_USERNAME:notification_user}
    password: ${SPRING_DATASOURCE_PASSWORD:notification_pass}

  jpa:
    hibernate:
      ddl-auto: validate      # Flyway owns the schema (src/main/resources/db/migration)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    # Existing databases created by Hibernate are baselined at V1; fresh
    # databases run the full migration chain from V1.
    baseline-on-migrate: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:rallo}
    password: ${SPRING_RABBITMQ_PASSWORD:rallo_pass}

# When set, only requests stamped by the gateway (X-Gateway-Secret) are accepted.
gateway:
  shared-secret: ${GATEWAY_SHARED_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
